services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: factory-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  nodered:
    image: nodered/node-red:latest
    container_name: factory-nodered
    ports:
      - "1880:1880"
    volumes:
      - ./nodered:/data
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
